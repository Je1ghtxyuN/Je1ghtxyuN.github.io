services:
  backend-api:
    build:
      context: ./backend-api
    image: je1ght-backend-api:latest
    container_name: je1ght-backend-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /home/je1ght/websites/je1ght-platform/portal-source:/portal-source:rw
    networks:
      - database_default
      - internet

  nginx:
    image: nginx:alpine
    container_name: je1ght-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/je1ght/websites/je1ght-platform/portal-source/public:/usr/share/nginx/html:ro
    networks:
      - database_default
      - internet
    depends_on:
      - backend-api

networks:
  database_default:
    external: true
  internet:
    driver: bridge
