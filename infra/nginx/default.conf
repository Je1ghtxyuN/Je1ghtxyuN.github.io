server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Study Room SPA fallback
    location /study-app/ {
        try_files $uri $uri/ /study-app/index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend-api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend-api:3001/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://backend-api:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend-api:3001/health;
        proxy_http_version 1.1;
    }

    location /music/ {
        proxy_pass http://backend-api:3001/music/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /study-sessions {
        proxy_pass http://backend-api:3001/study-sessions;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /blog/ {
        proxy_pass http://backend-api:3001/blog/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /site-profile {
        proxy_pass http://backend-api:3001/site-profile;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
