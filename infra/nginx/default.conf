server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend-api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        rewrite ^/admin/$ /admin/index.html break;
        proxy_pass http://backend-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /auth/ {
        proxy_pass http://backend-api:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend-api:3001/health;
        proxy_http_version 1.1;
    }

    location /site-profile {
        proxy_pass http://backend-api:3001/site-profile;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}
