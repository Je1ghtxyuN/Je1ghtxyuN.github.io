<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="login-view" class="view">
      <div class="login-card">
        <h1>Admin Login</h1>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
          <p id="login-error" class="error"></p>
        </form>
      </div>
    </div>

    <div id="dashboard-view" class="view" style="display:none">
      <nav class="topbar">
        <span class="topbar-title">Admin Dashboard</span>
        <div class="topbar-actions">
          <button id="rebuild-btn" class="btn btn-accent">Rebuild Portal</button>
          <button id="logout-btn" class="btn btn-ghost">Logout</button>
        </div>
      </nav>

      <div class="tabs">
        <button class="tab active" data-tab="posts">Blog Posts</button>
        <button class="tab" data-tab="portfolio">Portfolio</button>
        <button class="tab" data-tab="profile">Site Profile</button>
      </div>

      <!-- Blog Posts Tab -->
      <div id="tab-posts" class="tab-content active">
        <div class="toolbar">
          <h2>Blog Posts</h2>
          <button id="new-post-btn" class="btn btn-primary">+ New Post</button>
        </div>
        <div id="posts-list" class="list"></div>
      </div>

      <!-- Portfolio Tab -->
      <div id="tab-portfolio" class="tab-content">
        <div class="toolbar">
          <h2>Portfolio Items</h2>
          <button id="new-portfolio-btn" class="btn btn-primary">+ New Item</button>
        </div>
        <div id="portfolio-list" class="list"></div>
      </div>

      <!-- Site Profile Tab -->
      <div id="tab-profile" class="tab-content">
        <div class="toolbar">
          <h2>Site Profile</h2>
          <button id="save-profile-btn" class="btn btn-primary">Save Profile</button>
        </div>

        <div class="profile-sections">
          <!-- Owner Info -->
          <section class="profile-section">
            <h3>Owner Info</h3>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="pf-display-name">Display Name</label>
                <input type="text" id="pf-display-name">
              </div>
              <div class="form-group flex-1">
                <label for="pf-full-name">Full Name</label>
                <input type="text" id="pf-full-name">
              </div>
            </div>
          </section>

          <!-- Brand & Images -->
          <section class="profile-section">
            <h3>Brand & Images</h3>
            <div class="form-group">
              <label for="pf-subtitle">Subtitle / Tagline</label>
              <input type="text" id="pf-subtitle">
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="pf-avatar">Avatar Image Path</label>
                <div class="input-with-preview">
                  <input type="text" id="pf-avatar" placeholder="/shared-assets/images/profile.jpg">
                  <img id="pf-avatar-preview" class="img-preview" src="" alt="Avatar preview">
                </div>
              </div>
              <div class="form-group flex-1">
                <label for="pf-icon">Site Icon Path</label>
                <div class="input-with-preview">
                  <input type="text" id="pf-icon" placeholder="/shared-assets/images/icon.png">
                  <img id="pf-icon-preview" class="img-preview img-preview--sm" src="" alt="Icon preview">
                </div>
              </div>
            </div>
            <div class="form-group">
              <label for="pf-hero-bg">Hero Background Path</label>
              <input type="text" id="pf-hero-bg" placeholder="/shared-assets/images/background.jpg">
            </div>
            <div class="form-group">
              <label for="pf-hero-phrases">Typewriter Phrases (one per line)</label>
              <textarea id="pf-hero-phrases" rows="4" placeholder="Code, Anime, Games, and Coffee.&#10;VR, HCI, and game dev.&#10;Writing things down so I don't forget."></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="pf-started-date">Site Started Date</label>
                <input type="date" id="pf-started-date">
              </div>
              <div class="form-group">
                <label for="pf-started-year">Site Started Year</label>
                <input type="number" id="pf-started-year" min="2000" max="2100">
              </div>
            </div>
          </section>

          <!-- Intro -->
          <section class="profile-section">
            <h3>Introduction</h3>
            <div class="form-group">
              <label for="pf-intro-short">Short Intro (displayed on homepage)</label>
              <input type="text" id="pf-intro-short">
            </div>
            <div class="form-group">
              <label for="pf-intro-long">Long Intro (displayed on About page)</label>
              <textarea id="pf-intro-long" rows="4"></textarea>
            </div>
          </section>

          <!-- Social Links -->
          <section class="profile-section">
            <h3>Social Links</h3>
            <div id="pf-social-links"></div>
            <button type="button" class="btn btn-ghost btn-sm" id="pf-add-social">+ Add Social Link</button>
          </section>

          <!-- Contact -->
          <section class="profile-section">
            <h3>Contact Info</h3>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="pf-contact-email">Email</label>
                <input type="text" id="pf-contact-email">
              </div>
              <div class="form-group flex-1">
                <label for="pf-contact-location">Location</label>
                <input type="text" id="pf-contact-location">
              </div>
            </div>
            <div class="form-group">
              <label for="pf-contact-note">Availability Note</label>
              <input type="text" id="pf-contact-note">
            </div>
            <div class="form-group">
              <label for="pf-contact-formspree">Formspree Endpoint</label>
              <input type="text" id="pf-contact-formspree" placeholder="https://formspree.io/f/your-id">
            </div>
          </section>

          <!-- About Page -->
          <section class="profile-section">
            <h3>About Page</h3>
            <div class="form-group">
              <label for="pf-about-title">Section Title</label>
              <input type="text" id="pf-about-title" value="About Me">
            </div>
            <div class="form-group">
              <label for="pf-about-summary">Summary</label>
              <textarea id="pf-about-summary" rows="2"></textarea>
            </div>
            <div class="form-group">
              <label for="pf-about-skills-title">Skills Title</label>
              <input type="text" id="pf-about-skills-title" value="Skills">
            </div>
            <div class="form-group">
              <label>Skills</label>
              <div id="pf-skills"></div>
              <button type="button" class="btn btn-ghost btn-sm" id="pf-add-skill">+ Add Skill</button>
            </div>
            <div class="form-group">
              <label for="pf-about-exp-title">Experience Title</label>
              <input type="text" id="pf-about-exp-title" value="Experience">
            </div>
            <div class="form-group">
              <label>Experience</label>
              <div id="pf-experience"></div>
              <button type="button" class="btn btn-ghost btn-sm" id="pf-add-experience">+ Add Experience</button>
            </div>
          </section>

          <!-- Homepage Settings -->
          <section class="profile-section">
            <h3>Homepage Settings</h3>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="pf-home-shortcuts">Shortcuts Title</label>
                <input type="text" id="pf-home-shortcuts">
              </div>
              <div class="form-group flex-1">
                <label for="pf-home-posts">Recent Posts Title</label>
                <input type="text" id="pf-home-posts">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="pf-home-portfolio">Portfolio Preview Title</label>
                <input type="text" id="pf-home-portfolio">
              </div>
              <div class="form-group flex-1">
                <label for="pf-home-footer">Footer Title</label>
                <input type="text" id="pf-home-footer">
              </div>
            </div>
            <div class="form-group">
              <label for="pf-home-empty">Empty Posts Text</label>
              <input type="text" id="pf-home-empty">
            </div>
          </section>

          <!-- Footer -->
          <section class="profile-section">
            <h3>Footer</h3>
            <div class="form-group">
              <label for="pf-footer-note">Footer Note</label>
              <textarea id="pf-footer-note" rows="2"></textarea>
            </div>
          </section>
        </div>
      </div>

      <!-- Post Editor Modal -->
      <div id="post-editor-modal" class="modal" style="display:none">
        <div class="modal-content modal-large">
          <div class="modal-header">
            <h2 id="post-editor-title">New Post</h2>
            <button class="btn btn-ghost modal-close">&times;</button>
          </div>
          <form id="post-form">
            <input type="hidden" id="post-id">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="post-title">Title</label>
                <input type="text" id="post-title" required>
              </div>
              <div class="form-group">
                <label for="post-slug">Slug</label>
                <input type="text" id="post-slug" placeholder="auto-generated">
              </div>
            </div>
            <div class="form-group">
              <label for="post-description">Description</label>
              <input type="text" id="post-description">
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="post-categories">Categories (comma-separated)</label>
                <input type="text" id="post-categories">
              </div>
              <div class="form-group flex-1">
                <label for="post-tags">Tags (comma-separated)</label>
                <input type="text" id="post-tags">
              </div>
            </div>
            <div class="form-group">
              <label for="post-cover">Cover Image URL</label>
              <input type="text" id="post-cover" placeholder="/shared-assets/images/...">
            </div>
            <div class="form-group">
              <label for="post-content">Content (Markdown)</label>
              <textarea id="post-content" rows="20" class="code-editor" required></textarea>
            </div>
            <div class="form-row">
              <label class="checkbox-label">
                <input type="checkbox" id="post-published"> Published
              </label>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-ghost modal-close">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Portfolio Editor Modal -->
      <div id="portfolio-editor-modal" class="modal" style="display:none">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="portfolio-editor-title">New Portfolio Item</h2>
            <button class="btn btn-ghost modal-close">&times;</button>
          </div>
          <form id="portfolio-form">
            <input type="hidden" id="portfolio-id">
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="portfolio-title">Title</label>
                <input type="text" id="portfolio-title" required>
              </div>
              <div class="form-group">
                <label for="portfolio-slug">Slug</label>
                <input type="text" id="portfolio-slug" placeholder="auto-generated">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="portfolio-year">Year</label>
                <input type="text" id="portfolio-year" placeholder="2026">
              </div>
              <div class="form-group flex-1">
                <label for="portfolio-status">Status</label>
                <input type="text" id="portfolio-status" placeholder="Active">
              </div>
            </div>
            <div class="form-group">
              <label for="portfolio-summary">Summary</label>
              <textarea id="portfolio-summary" rows="3" required></textarea>
            </div>
            <div class="form-group">
              <label for="portfolio-cover">Cover Image URL</label>
              <input type="text" id="portfolio-cover" placeholder="/shared-assets/images/...">
            </div>
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="portfolio-tech">Tech Stack (comma-separated)</label>
                <input type="text" id="portfolio-tech">
              </div>
              <div class="form-group flex-1">
                <label for="portfolio-tags">Tags (comma-separated)</label>
                <input type="text" id="portfolio-tags">
              </div>
            </div>
            <div class="form-group">
              <label for="portfolio-links">Links (JSON)</label>
              <input type="text" id="portfolio-links" placeholder='{"repo":"https://...","demo":"https://..."}'>
            </div>
            <div class="form-group">
              <label for="portfolio-sort">Sort Order</label>
              <input type="number" id="portfolio-sort" value="0">
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-ghost modal-close">Cancel</button>
              <button type="submit" class="btn btn-primary">Save</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Rebuild Status Toast -->
      <div id="toast" class="toast" style="display:none"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
