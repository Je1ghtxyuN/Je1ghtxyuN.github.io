study_room:
  title: Study Room
  summary: A flagship focus application for deep work, immersive ambience, and long-session study flow.
  description: |
    The Study Room is now treated as a first-class product inside the platform family:
    an independent application with scene-based focus sessions, Pomodoro guidance,
    ambient playback, lightweight task capture, and future account-linked study data.
  cta_label: Enter Study Room
  cta_note: |
    The Study Room opens at `/study-app/` as a standalone experience while still
    sharing the same brand, assets, and future backend contract as the main portal.
  features:
    - Scene-first immersive focus timer
    - Todo capture for lightweight study planning
    - Ambient music and atmosphere controls
    - Future login and study statistics sync
