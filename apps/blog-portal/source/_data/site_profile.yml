study_room:
  title: Study Room
  summary: A future standalone focus space for deep work, ambience, and low-friction productivity.
  description: The Study Room is planned as an independent application with timer flows, ambient audio, lightweight task capture, and future statistics sync while still sharing the platform identity.
  cta_label: Enter Study Room
  cta_note: During local Hexo development the button points to the Vite app on `http://localhost:5173`. Generated portal builds point to the production placeholder route `/study-app/` until deployment is finalized.
  features:
    - Focus timer with long-session friendly UX
    - Todo capture for small study goals
    - Ambient music and mood controls
    - Future login and study statistics sync
